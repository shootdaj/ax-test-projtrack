<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Tracker</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div id="app">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-header">
        <h1>Project Tracker</h1>
      </div>

      <div class="sidebar-nav">
        <div class="nav-item active" id="nav-kanban"><span>&#9634;</span> Kanban Board</div>
        <div class="nav-item" id="nav-dashboard"><span>&#9632;</span> Dashboard</div>
        <div class="nav-item" id="nav-sprints"><span>&#8634;</span> Sprints</div>
      </div>

      <div class="project-list">
        <div class="project-list-header">
          <span>Projects</span>
          <button class="btn-add-project" id="btn-new-project">+ New</button>
        </div>
        <div id="project-items"></div>
      </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
      <!-- Top Bar -->
      <div class="topbar">
        <div class="topbar-left">
          <h2 id="project-title">Project Tracker</h2>
          <button class="btn btn-primary" id="btn-add-task">+ Add Task</button>
        </div>
        <div class="search-box">
          <input type="text" id="search-input" placeholder="Search tasks...">
        </div>
      </div>

      <!-- Kanban View -->
      <div class="view-content active" id="view-kanban">
        <div class="kanban-board" id="kanban-columns"></div>
      </div>

      <!-- Dashboard View -->
      <div class="view-content" id="view-dashboard">
        <div class="dashboard-view" id="dashboard-content"></div>
      </div>

      <!-- Sprint View -->
      <div class="view-content" id="view-sprints">
        <div class="sprint-view" id="sprint-content"></div>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay hidden" id="modal-overlay">
    <div class="modal" id="modal-content"></div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
